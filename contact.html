<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡我們 | Ashita Store 專業諮詢服務</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav id="navbar" class="scrolled">
        <div class="container nav-container">
            <a href="index.html" class="logo">Ashita <span>Store</span></a>
            <ul class="nav-links">
                <li><a href="index.html">首頁</a></li>
                <li><a href="about.html">關於我們</a></li>
                <li><a href="quality.html">品質認證</a></li>
                <li><a href="products.html">產品中心</a></li>
                <li><a href="global.html">全球佈局</a></li>
                <li><a href="contact.html">聯絡我們</a></li>
            </ul>
        </div>
    </nav>

    <header class="about-hero" style="background: var(--primary);">
        <div class="container">
            <h1>聯絡我們</h1>
            <p>與我們聯繫，開啟合作新契機</p>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="contact-container">
                <div class="contact-info">
                    <h2 style="color: var(--primary); margin-bottom: 30px;">立即與我們聯絡</h2>
                    <p style="font-size: 1.5rem; color: var(--secondary); font-weight: 700; margin-bottom: 30px;">
                        <i class="fas fa-headset"></i> 諮詢專線：0800-000-893
                    </p>
                    
                    <h3>總部資訊</h3>
                    <p><i class="fas fa-map-marker-alt"></i> 地址：台灣桃園市中壢區榮安十三街58巷22號</p>
                    <p><i class="fas fa-envelope"></i> 電子郵件：service@ashitastore.com</p>
                    <p><i class="fas fa-clock"></i> 營業時間：週一至週五 09:00 - 18:00</p>

                    <div style="margin-top: 40px;">
                        <h3>追蹤我們</h3>
                        <div style="display: flex; gap: 20px; font-size: 2rem; margin-top: 15px;">
                            <a href="#" style="color: #0077b5;"><i class="fab fa-linkedin"></i></a>
                            <a href="#" style="color: #1877f2;"><i class="fab fa-facebook"></i></a>
                            <a href="#" style="color: #e4405f;"><i class="fab fa-instagram"></i></a>
                        </div>
                    </div>
                </div>

                <form class="contact-form" id="contactForm">
                    <div class="form-group">
                        <label for="name">您的姓名 / 寶號</label>
                        <input type="text" id="name" required placeholder="請輸入姓名或公司名稱">
                    </div>
                    <div class="form-group">
                        <label for="email">電子郵件</label>
                        <input type="email" id="email" required placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label for="type">諮詢類別</label>
                        <select id="type">
                            <option value="general">一般查詢</option>
                            <option value="b2b">大宗採購 / 代理需求</option>
                            <option value="oem">OEM / ODM 合作</option>
                            <option value="after-sales">售後服務</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">諮詢內容</label>
                        <textarea id="message" required placeholder="請簡述您的需求，我們將儘快派專人聯繫。"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">送出訊息</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Map Section Placeholder -->
    <section style="padding: 0;">
        <div style="background: #f3f4f6; height: 400px; display: flex; align-items: center; justify-content: center; color: #9ca3af;">
            <p><i class="fas fa-map"></i> 這裡是總部地理位置地圖 (Google Maps 嵌入處)</p>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Ashita Store Co., Ltd.</p>
            </div>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
